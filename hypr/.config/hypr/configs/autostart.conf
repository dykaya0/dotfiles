source = ~/.config/hypr/configs/variables.conf

## Autostart
# System dependencies
exec-once = $XDG_CONFIG_HOME/hypr/scripts/dependency-check.sh
exec-once = waybar -c $waybarConfig
exec-once = hyprpaper
exec-once = hypridle
exec-once = $XDG_CONFIG_HOME/hypr/scripts/autostart-other.sh
# Startup configurations
exec-once = mpv --no-config $soundFx3
##Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

## Screensharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

