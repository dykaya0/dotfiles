################
### MONITORS ###
################

monitor= $secondMonitor,preferred,auto,1
monitor= $mainMonitor,preferred,auto,1
monitor = , preferred, auto, 1, mirror, $mainMonitor # Mirrors main monitor to any unspecified output (comment if secondMonitor is not specified to prevent override)

## Defaults(LINE ORDER MATTERS 'sed -n '10,20p' $XDG_CONFIG_HOME/hypr/configs/variables.conf')
$mainMonitor = DP-2
$secondMonitor = HDMI-A-1
$launchUrl = "http://192.168.1.200:8888"
$browser = librewolf --new-window $launchUrl
$devBrowser = qutebrowser
$terminal = ghostty
$fileManager = thunar
$emailClient = thunderbird
$textEditor = $terminal -e nvim
$menu = rofi -show drun
$blackWallpaper = $HOME/pictures/wallpapers/black_screen.png

## Scripts
$clipboardHistory = $XDG_CONFIG_HOME/scripts/menu/clipboard-history.sh
$refreshWaybar = $XDG_CONFIG_HOME/scripts/refresh_waybar.sh
$toggleWaybar = $XDG_CONFIG_HOME/scripts/toggle_waybar.sh
$bookmarkSearch = $XDG_CONFIG_HOME/scripts/bookmarks-menu/search.sh
$audioSwitcherScript = $XDG_CONFIG_HOME/scripts/menu/audio-switcher.sh
$reloadConfigScript = $XDG_CONFIG_HOME/hypr/scripts/reload-config.sh
$screenshotMenu = $XDG_CONFIG_HOME/scripts/menu/screenshot-menu.sh
$bookmarkScripts = $HOME/.local/bin/bookmarks-scripts.sh
$runScripts = $HOME/.local/bin/run-scripts.sh

## Sound Effects
$soundFx1 = $XDG_CONFIG_HOME/hypr/utils/disco_elysium_fx/physique.mp3
$soundFx2 = $XDG_CONFIG_HOME/hypr/utils/disco_elysium_fx/psyche.mp3
$soundFx3 = $XDG_CONFIG_HOME/hypr/utils/disco_elysium_fx/motorics.mp3
$soundFx4 = $XDG_CONFIG_HOME/hypr/utils/disco_elysium_fx/intellect.mp3

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18
# env = GTK_THEME,adw-gtk3-dark

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct
