# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Colors
backgroundColor="#101010"
backgroundAltColor="#202020"
overlayColor="#272727"
textColor="#ffffff"
highlightColor="#458ee6"
contrastColor="#f54d27"
# Options

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set-option -g renumber-windows on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g xterm-keys on
set-window-option -g mode-keys vi

# set-hook -g client-detached \
#   'run-shell "hyprctl dispatch tagwindow -- -tmux"'

# Unbind default split keys
unbind '"'
unbind %
unbind -n C-Left
unbind -n C-Right
unbind -n C-Up
unbind -n C-Down

# Keybindings

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

bind-key c confirm-before -p "Kill window '#W'? (y/n)" kill-window
bind-key x kill-pane
bind w choose-tree -s -w

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind C-d display-popup \
    -d "#{pane_current_path}" \
    -w 80% \
    -h 80% \
    -E "lazydocker"

## tmux-sessionizer
bind Tab display-popup -E -w 40% -h 80% "$XDG_CONFIG_HOME/scripts/tmux-session.sh"

# Theme
set-option -g status-position top
set -g status-justify absolute-centre
set -g status-interval 1

## Pane background color (inactive + active panes)
set -g window-style "bg=${backgroundAltColor}"
set -g window-active-style "bg=${backgroundColor}"

set -g status-style "fg=${textColor},bg=${overlayColor}"
set -g message-style "fg=${textColor},bg=${contrastColor}"
set -g mode-style "fg=${overlayColor},bg=${textColor}"

set -g status-left "#[fg=#{?client_prefix,${overlayColor},${textColor}},bg=#{?client_prefix,${highlightColor},${overlayColor}},bold] #S"
set -g status-left-length 100
set -g status-right "#[fg=${textColor}] #(tomato -t)"
set -g status-right-length 100

set -g window-status-format "#[fg=${textColor},bg=${overlayColor}]  #I #W"
set -g window-status-current-format "#[fg=${highlightColor},bg=${overlayColor}]  #I #W"

set -g pane-border-style "fg=${highlightColor},bg=${backgroundAltColor}"
set -g pane-active-border-style "fg=${highlightColor},bg=${backgroundColor}"

run '~/.tmux/plugins/tpm/tpm'
